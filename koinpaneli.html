<!DOCTYPE html>
<html lang="tr">

<!-- Mirrored from www.wolatil.com/koinpaneli.html by HTTrack Website Copier/3.x [XR&CO'2014], Tue, 16 Jun 2026 09:22:15 GMT -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koin Paneli</title>
  <script type="module" src="auth-check-include.js"></script>
  <script>
    let coins = [];

    async function fetchData() {
      try {
        const response = await fetch("gateio_data.json");
        const data = await response.json();
        coins = data.map(item => item.currency_pair.toLowerCase());
        coins.sort((a, b) => a.length - b.length);
      } catch (error) {
        console.error("JSON yüklenirken hata oluştu:", error);
      }
    }

    function searchCoins() {
      const input = document.getElementById("search").value.toLowerCase();
      const suggestions = document.getElementById("suggestions");
      suggestions.innerHTML = ""; // Önceki önerileri temizle

      if (input.length === 0) return;

      const filtered = coins.filter(coin => coin.includes(input));
      if (filtered.length > 0) {
        filtered.forEach(coin => {
          const div = document.createElement("div");
          div.innerText = coin;
          div.classList.add("suggestion-item");
          div.onclick = () => selectCoin(coin);
          suggestions.appendChild(div);
        });
      } else {
        const div = document.createElement("div");
        div.innerText = "Aradığın koin yoksa tıkla";
        div.classList.add("suggestion-item");
        div.onclick = () => {
          document.getElementById("chartFrame").src = "binancekoinpaneli.html";
          document.getElementById("search-container").style.display = "none";
          suggestions.innerHTML = "";
          adjustIframeHeight(); // İframe yüksekliğini güncelle
        };
        suggestions.appendChild(div);
      }
    }

    function selectCoin(coin) {
      document.getElementById("search").value = coin;
      document.getElementById("suggestions").innerHTML = "";
      document.getElementById("chartFrame").src = `https://wolatil.com/grid1.php?koin=${coin}&saat=1h`;
      adjustIframeHeight(); // İframe yüksekliğini güncelle
    }

    function adjustIframeHeight() {
      const iframe = document.getElementById("chartFrame");
      const searchContainerHeight = document.getElementById("search-container").offsetHeight;
      iframe.style.height = `${window.innerHeight - searchContainerHeight}px`;
    }

    window.onload = () => {
      fetchData();
      adjustIframeHeight();
    };
    
    window.onresize = adjustIframeHeight;
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    html, body { height: 100%; background-color: black; color: white; text-align: center; overflow: hidden; }
    #search-container { padding: 20px; background: black; }
    input { padding: 10px; width: 300px; font-size: 16px; background: #222; color: white; border: 1px solid #555; border-radius: 5px; }
   ..suggestions {
  position: absolute;
  top: 100%; /* Bu, input alanının hemen altına yerleşmesini sağlar */
  left: 0;
  width: 100%; /* input alanının genişliği kadar genişlik */
  background: #111;
  border: 1px solid #555;
  border-radius: 5px;
  max-height: 200px; /* Öneri kutusunun yüksekliğini sınırladık */
  overflow-y: auto; /* Kaydırma çubuğu ekliyoruz */
  z-index: 10; /* iframe'in üstünde görünmesi için z-index ekliyoruz */
}

    .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; }
    .suggestion-item:hover { background: #333; }
    .iframe-container { width: 100%; height: calc(100vh - 80px); position: relative; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <div id="search-container">
    <input type="text" id="search" oninput="searchCoins()" placeholder="Koin adı girin...">
    <div id="suggestions" class="suggestions"></div>
  </div>
  <div class="iframe-container">
    <iframe id="chartFrame" src="#" allow="fullscreen"></iframe>
  </div>
</body>
