    <script>
        const tableBody = document.querySelector("#crypto-table");
        let previousOrder = [];
        let selectedCoins = JSON.parse(localStorage.getItem("selectedCoins")) || [];
        let coins = [];
        let alarms = JSON.parse(localStorage.getItem("alarms")) || {};
        let currentAlarms = {};
        let alarmTimers = {};
        let lastPrices = JSON.parse(localStorage.getItem("lastPrices")) || {};
        let percentageAlarms = JSON.parse(localStorage.getItem("percentageAlarms")) || {};
        let triggeredAlarms = JSON.parse(localStorage.getItem("triggeredAlarms")) || [];
		
		
        async function fetchData() {
            try {
                const response = await fetch("gateio_data.json");
                const data = await response.json();
                coins = data.map(entry => entry.currency_pair.toLowerCase());
                coins.sort((a, b) => a.length - b.length);
                return data;
            } catch (error) {
                console.error("JSON yüklenirken hata oluştu:", error);
                return [];
            }
        }

        function searchCoins() {
            const input = document.getElementById("search").value.toLowerCase();
            const suggestions = document.getElementById("suggestions");
            suggestions.innerHTML = "";

            if (input.length === 0) return;

            const filtered = coins.filter(coin => coin.includes(input));
            filtered.forEach(coin => {
                const div = document.createElement("div");
                div.innerText = coin.toUpperCase();
                div.classList.add("suggestion-item");
                div.onclick = () => addCoin(coin);
                suggestions.appendChild(div);
            });
        }

        function addCoin(coin) {
            if (!selectedCoins.includes(coin)) {
                selectedCoins.push(coin);
                localStorage.setItem("selectedCoins", JSON.stringify(selectedCoins));
                refreshData();
            }
            document.getElementById("search").value = "";
            document.getElementById("suggestions").innerHTML = "";
        }

        function removeCoin(coin) {
            selectedCoins = selectedCoins.filter(c => c !== coin);
            delete alarms[coin];
            delete currentAlarms[coin];
            delete lastPrices[coin];
            localStorage.setItem("selectedCoins", JSON.stringify(selectedCoins));
            localStorage.setItem("alarms", JSON.stringify(alarms));
            localStorage.setItem("lastPrices", JSON.stringify(lastPrices));
            refreshData();
        }

function adjustPrice(type, adjustment) {
    const input = document.getElementById(`alarm${type[0].toUpperCase() + type.slice(1)}Price`);
    let currentValue = parseFloat(input.value) || 0;

    // **1'den büyükse tam sayı artır/azalt, küçükse hassas değişim yap**
    if (currentValue >= 1) {
        adjustment = adjustment > 0 ? 1 : -1; // **Tam sayı artır veya azalt**
    } else {
        adjustment = adjustment > 0 ? 0.01 : -0.01; // **Küçük fiyatlarda kuruş bazında değişim**
    }

    let newValue = currentValue + adjustment;

    // **8 basamaklı formatı koruyarak yeni değeri ayarla**
    input.value = newValue.toFixed(8);
}


        function adjustDuration(adjustment) {
            const input = document.getElementById('alarmDuration');
            const currentValue = parseInt(input.value) || 3;
            input.value = Math.max(1, Math.min(5, currentValue + adjustment));
        }

function openAlarmModal(coin) {
    const modal = document.getElementById("alarmModal");
    document.getElementById("alarmCoin").value = coin;
    const currentPrice = lastPrices[coin] || 0;
    document.getElementById("alarmRisePrice").value = currentPrice.toPrecision(8);
    document.getElementById("alarmFallPrice").value = currentPrice.toPrecision(8);

    // **Alarmlar gerçekten varsa checkbox'ları işaretle, yoksa kaldır**
    if (alarms[coin]) {
        document.getElementById("enableRiseAlarm").checked = !!alarms[coin].rise;
        document.getElementById("enableFallAlarm").checked = !!alarms[coin].fall;

        if (alarms[coin].rise) {
            document.getElementById("alarmRisePrice").value = alarms[coin].rise.price.toPrecision(8);
        }
        if (alarms[coin].fall) {
            document.getElementById("alarmFallPrice").value = alarms[coin].fall.price.toPrecision(8);
        }
    } else {
        // **Alarm yoksa checkbox'ları temizle**
        document.getElementById("enableRiseAlarm").checked = false;
        document.getElementById("enableFallAlarm").checked = false;
    }

    modal.style.display = "block";
}

function setAlarm() {
    const coin = document.getElementById("alarmCoin").value;
    const risePrice = parseFloat(document.getElementById("alarmRisePrice").value);
    const fallPrice = parseFloat(document.getElementById("alarmFallPrice").value);
    const enableRise = document.getElementById("enableRiseAlarm").checked;
    const enableFall = document.getElementById("enableFallAlarm").checked;
    const duration = parseInt(document.getElementById("alarmDuration").value) * 60;

    if (!enableRise && !enableFall) {
        delete alarms[coin]; // Hiçbir alarm ayarlanmadıysa tamamen kaldır
        localStorage.setItem("alarms", JSON.stringify(alarms));
        document.getElementById("enableRiseAlarm").checked = false;
        document.getElementById("enableFallAlarm").checked = false;
    } else {
        alarms[coin] = {
            rise: enableRise ? { price: risePrice, duration: duration } : null,
            fall: enableFall ? { price: fallPrice, duration: duration } : null
        };
        localStorage.setItem("alarms", JSON.stringify(alarms));
    }

    document.getElementById("alarmModal").style.display = "none";
    refreshData();
}

// **Popup kapatıldığında hiçbir şey kaybolmasın**
function closePopup() {
    const popup = document.getElementById("alarmPopup");
    popup.style.display = "none";
}

window.onload = async function () {
    await fetchData();
    refreshData();
    setInterval(refreshData, 2000);

    // LocalStorage'dan önceki tetiklenen alarmları al
    triggeredAlarms = JSON.parse(localStorage.getItem("triggeredAlarms")) || [];

    // Eski alarmları ekrana yazdır
    logTriggeredAlarm(true); 
};

        async function refreshData() {
            const newData = await fetchData();
            const filteredData = newData.filter(entry => selectedCoins.includes(entry.currency_pair.toLowerCase()));
            updateTable(filteredData);
        }

        function updateTable(newData) {
            const rows = Array.from(tableBody.querySelectorAll("tr"));
            const currentOrder = newData.map(entry => entry.currency_pair.toLowerCase());

            newData.sort((a, b) => parseFloat(b.percentChange) - parseFloat(a.percentChange));

            setTimeout(() => {
                tableBody.innerHTML = "";
                newData.forEach((info, index) => {
                    const row = createRow(info.currency_pair.toLowerCase(), info);
                    tableBody.appendChild(row);
                    row.style.order = index;
                    checkAlarm(row, info);
                    updatePriceColor(row, info);
                });

                previousOrder = currentOrder;
            }, 500);
        }

        function createRow(coin, info) {
            const row = document.createElement("tr");
            row.dataset.coin = coin;
            
			
			let quoteVolume = parseFloat(info.quoteVolume);
let baseVolume = parseFloat(info.baseVolume);

// **Hacim sıfırsa NaN hatasını önle**
let volumePercentage = baseVolume > 0 ? ((quoteVolume / baseVolume) * 100).toFixed(2) : "0.00";

// **Mantıksız büyük/küçük rakamları düzelt**
if (volumePercentage > 10000) {
    volumePercentage = ">10000"; // **Çok büyükse sınır koy**
} else if (volumePercentage < 0.01 && volumePercentage > 0) {
    volumePercentage = "<0.01"; // **Çok küçükse sıfırdan farklı olduğunu göster**
}

			
			
            const formattedCoin = coin.replace('_usdt', '').toUpperCase();
            const priceCell = `<td class="price-cell"><span>${info.last}</span></td>`;

            row.innerHTML = `
              <td style="width: 25px; text-align: center;">
    <button class="delete-btn" onclick="removeCoin('${coin}')">✖</button>
</td>
<td class="alarm-cell" style="width: 25px; text-align: center;">
    <span onclick="openAlarmModal('${coin}')">     ⏰</span>
</td>
                <td><a href="https://www.tradingview.com/chart/BKBuIPdh/?symbol=${coin.replace('_', '').toLowerCase()}" target="wolatil">${formattedCoin}</a></td>
                ${priceCell}
                <td style="color: ${info.percentChange < 0 ? 'red' : 'yellow'};">${parseFloat(info.percentChange).toFixed(2)}%</td>
                <td>${volumePercentage}%</td>
                <td>${info.high24hr}</td>
<td>${info.low24hr}</td>

            `;

            return row;
        }

function checkAlarm(row, info) {
    const coin = row.dataset.coin;
    if (alarms[coin]) {
        const currentPrice = parseFloat(info.last);
        const alarm = alarms[coin];
        let triggered = false;
        let triggeredType = null;
        let triggeredPrice = null;

        if (alarm.rise && currentPrice >= alarm.rise.price) {
            showAlarmPopup(coin, 'Yükseliş', currentPrice, alarm.rise.price);
            highlightRow(row, 'green', alarm.rise.duration, 'white');
            triggered = true;
            triggeredType = "rise"; // Yükseliş alarmı tetiklendi
            triggeredPrice = alarm.rise.price;
            delete alarms[coin].rise; // Yükseliş alarmını sil
        } 
        
        if (alarm.fall && currentPrice <= alarm.fall.price) {
            showAlarmPopup(coin, 'Düşüş', currentPrice, alarm.fall.price);
            highlightRow(row, 'red', alarm.fall.duration, 'white');
            triggered = true;
            triggeredType = "fall"; // Düşüş alarmı tetiklendi
            triggeredPrice = alarm.fall.price;
            delete alarms[coin].fall; // Düşüş alarmını sil
        }

        if (triggered) {
            logTriggeredAlarm(coin, currentPrice, triggeredPrice, triggeredType); // **Log kesin olarak çalışıyor**

            // **Eğer coin için ne yükseliş ne de düşüş alarmı kalmadıysa, tamamen kaldır**
            if (!alarms[coin].rise && !alarms[coin].fall) {
                delete alarms[coin];
                delete currentAlarms[coin]; // Aktif alarmlardan da kaldır

                // **Checkbox'ları tamamen sıfırla**
                document.getElementById("enableRiseAlarm").checked = false;
                document.getElementById("enableFallAlarm").checked = false;
            }

            localStorage.setItem("alarms", JSON.stringify(alarms)); // LocalStorage'a güncellenmiş alarmları kaydet
        }
    }
}








function showAlarmPopup(coin, status, currentPrice, setPrice) {
    const popup = document.getElementById("alarmPopup");
    const title = document.getElementById("alarmTitle");
    const details = document.getElementById("alarmDetails");

    title.textContent = `${coin.toUpperCase()} - ${status}`;
    details.textContent = `Şu anki fiyat: ${currentPrice.toFixed(8)} - Alarm fiyatı: ${setPrice.toFixed(8)}`;

    popup.style.display = "block";
}











function saveTriggeredAlarms() {

}

function logTriggeredAlarm(coin, currentPrice, alarmPrice, triggeredType) {

    const entry = {
        coin: formattedCoin,
        currentPrice: currentPrice,
        alarmPrice: alarmPrice,
        status: correctStatus,
        time: now.toLocaleString()

    `;

    triggeredAlarms.forEach(a => {

            <td style="padding: 8px; border: 1px solid #555; font-weight: bold; color: yellow;">${a.coin}</td>
            <td style="padding: 8px; border: 1px solid #555;">📈 ${a.status}</td>
            <td style="padding: 8px; border: 1px solid #555;">${a.currentPrice.toPrecision(8)}</td>
            <td style="padding: 8px; border: 1px solid #555;">${a.alarmPrice.toPrecision(8)}</td>
            <td style="padding: 8px; border: 1px solid #555; font-size: 12px; opacity: 0.8;">${a.time}</td>
        `;

        tableBody.appendChild(row);
    });

    console.log("✅ Alarm tablosu başarıyla güncellendi.");
}























function highlightRow(row, color, durationInSeconds, textColor) {
    if (!row) return;

    // **Sadece ilgili satırın rengini değiştir, DOM yapısını bozma**
    row.style.backgroundColor = color;
    row.style.transition = "background-color 0.5s ease-in-out";

    // **Metin rengini değiştir ama DOM yapısını değiştirme**
    Array.from(row.children).forEach(cell => {
        cell.style.color = textColor;
    });

    // **15 saniye beklemeden eski haline döndür (Güncelleme öncesi düzeltecek)**
    setTimeout(() => {
        row.style.backgroundColor = ""; // **Arka plan rengini eski haline getir**
        Array.from(row.children).forEach(cell => {
            cell.style.color = ""; // **Metin rengini sıfırla**
        });

        // **Diğer koinlerin asla kaybolmamasını sağla**
        const tableBody = document.getElementById("crypto-table");
        if (tableBody) {
            tableBody.style.display = "table"; // **Tabloyu tam görünür tut**
            tableBody.style.visibility = "visible"; // **Koinleri her zaman göster**
        }
    }, durationInSeconds * 1000 - 1); // **Güncellemeden hemen önce resetle**
}





        function updatePriceColor(row, info) {
            const coin = row.dataset.coin;
            const priceSpan = row.querySelector('.price-cell span');
            const currentPrice = parseFloat(info.last);
            const previousPrice = lastPrices[coin] || currentPrice;

            if (currentPrice > previousPrice) {
                priceSpan.style.color = 'yellow';
            } else if (currentPrice < previousPrice) {
                priceSpan.style.color = 'red';
            } else {
                priceSpan.style.color = 'white';
            }
            priceSpan.style.fontWeight = 'bold';

            lastPrices[coin] = currentPrice;
            localStorage.setItem("lastPrices", JSON.stringify(lastPrices));
        }

        // Modal functionality
        const modal = document.getElementById("alarmModal");
        const span = document.getElementsByClassName("close")[0];
        span.onclick = function() {
            modal.style.display = "none";
        }
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            } else if (event.target == document.getElementById("alarmPopup")) {
                closePopup();
            }
        }

        window.onload = async function () {
            await fetchData();
            refreshData();
            setInterval(refreshData, 5000);

            // Load existing alarms into currentAlarms for immediate checking
            for (let coin in alarms) {
                if (alarms[coin].rise || alarms[coin].fall) {
                    currentAlarms[coin] = alarms[coin];
                }
            }

            // Load and display triggered alarms
            logTriggeredAlarm();
        };
    </script>
