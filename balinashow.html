<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Balinaların Borsalara Gönderdiği Koinler</title>
    <script src='../cdn.jsdelivr.net/npm/chart.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels'></script>
    <style>
        body {
            background-color: #1a1a1d;
            color: white;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            width: 95%;
            max-width: 1200px;
            margin: auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(255, 255, 255, 0.2);
        }
        h2 {
            color: #f0ad4e;
            font-size: 32px;
            text-shadow: 2px 2px 12px rgba(255, 165, 0, 1);
        }
        canvas {
            max-width: 100%;
            height: 700px;
        }
    </style>
</head>
<body>
    <h2>Balinaların Son 1 Saatte Borsalara Gönderimleri</h2>
    <div class='container'>
        <canvas id='whaleChart'></canvas>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        const ctx = document.getElementById('whaleChart').getContext('2d');
        const whaleChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["BTC","USDT"],
                datasets: [{
                    label: 'Borsalara USDT Alım İçin Diğerleri SATIŞ İçin Yollanır',
                    data: [271.12,268.65],
                    backgroundColor: ["rgba(255, 0, 0, 0.9)","rgba(0, 255, 0, 0.9)"],
                    borderWidth: 2,
                    borderRadius: 8,
                    hoverBackgroundColor: 'rgba(255, 255, 255, 0.5)',
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            color: 'white',
                            font: { size: 18 },
                            callback: function(value) {
                                return value.toLocaleString() + 'M$';
                            }
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.2)'
                        }
                    },
                    x: {
                        ticks: {
                            color: 'white',
                            font: { size: 18 }
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.2)'
                        }
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            color: 'white',
                            font: { size: 18 }
                        }
                    },
                    tooltip: {
                        enabled: false
                    },
                    datalabels: {
                        color: 'white',
                        anchor: 'end',
                        align: 'top',
                        font: {
                            size: 18,
                            weight: 'bold'
                        },
                        formatter: function(value) {
                            return value.toLocaleString() + ' M$';
                        }
                    }
                },
                animation: {
                    duration: 20000,
                    easing: 'easeOutElastic'
                }
            }
        });
    </script>
</body>
